<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
    <title id="title">naoigcat GitHub public repository stats</title>
    <desc id="desc">Public commits, pull requests, issues, and contribution totals for naoigcat.</desc>
    <style>
        .bg { fill: #ffffff; }
        .border { fill: none; stroke: #d0d7de; }
        .title { fill: #24292f; font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .subtitle { fill: #57606a; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .column { fill: #6e7781; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .metric { fill: #24292f; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .value { fill: #0969da; font: 700 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .divider { stroke: #d8dee4; stroke-width: 1; }
        .footnote { fill: #6e7781; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <rect class="bg" x="0.5" y="0.5" width="759" height="429" rx="8" />
    <rect class="border" x="0.5" y="0.5" width="759" height="429" rx="8" />
    <text x="42" y="48" class="title">GitHub Stats</text>
    <text x="42" y="96" class="column">Metric</text>
    <text x="292" y="96" class="column" text-anchor="end">Total</text>
    <text x="468" y="96" class="column" text-anchor="end">2026</text>
    <text x="624" y="96" class="column" text-anchor="end">2025</text>

    <g>
        <line x1="42" y1="108" x2="718" y2="108" class="divider" />
        <text x="42" y="145" class="metric">Commits</text>
        <text x="292" y="147" class="value" text-anchor="end">819</text>
        <text x="468" y="147" class="value" text-anchor="end">111</text>
        <text x="624" y="147" class="value" text-anchor="end">44</text>
    </g>
    <g>
        <line x1="42" y1="176" x2="718" y2="176" class="divider" />
        <text x="42" y="213" class="metric">Pull Requests</text>
        <text x="292" y="215" class="value" text-anchor="end">4</text>
        <text x="468" y="215" class="value" text-anchor="end">0</text>
        <text x="624" y="215" class="value" text-anchor="end">0</text>
    </g>
    <g>
        <line x1="42" y1="244" x2="718" y2="244" class="divider" />
        <text x="42" y="281" class="metric">Issues</text>
        <text x="292" y="283" class="value" text-anchor="end">5</text>
        <text x="468" y="283" class="value" text-anchor="end">0</text>
        <text x="624" y="283" class="value" text-anchor="end">0</text>
    </g>
    <g>
        <line x1="42" y1="312" x2="718" y2="312" class="divider" />
        <text x="42" y="349" class="metric">Contributions</text>
        <text x="292" y="351" class="value" text-anchor="end">828</text>
        <text x="468" y="351" class="value" text-anchor="end">111</text>
        <text x="624" y="351" class="value" text-anchor="end">44</text>
    </g>
    <line x1="42" y1="370" x2="718" y2="370" class="divider" />
    <text x="42" y="400" class="footnote">Updated May 4, 2026 (Asia/Tokyo) · Contributions are commits + pull requests + issues.</text>
</svg>
